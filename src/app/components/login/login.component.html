<div class="login-page">
  <div class="login-container">
    <div class="login-header">
      <span class="icono-moneda">L</span>
      <h1>Luxe Joyas</h1>
      <p class="login-subtitle">Accede a la tienda de joyería premium y descubre piezas exclusivas.</p>
    </div>

    <div *ngIf="errorMessage" class="login-message error">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="login-message success">{{ successMessage }}</div>

    @if (!mostrarRegistro) {
      <form class="login-form" (submit)="onLogin($event)">
        <h2>Iniciar Sesión</h2>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" placeholder="tu@email.com" required [(ngModel)]="loginEmail" name="loginEmail">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="••••••••" required [(ngModel)]="loginPassword" name="loginPassword">
        </div>
        <button type="submit" class="btn-primary">Entrar</button>
        <p class="toggle-form">
          ¿No tienes cuenta? 
          <a (click)="toggleForm()">Regístrate aquí</a>
        </p>
      </form>
    } @else {
      <form class="login-form" (submit)="onRegistro($event)">
        <h2>Crear Cuenta</h2>
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" placeholder="Tu nombre" required [(ngModel)]="registerName" name="registerName">
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" placeholder="tu@email.com" required [(ngModel)]="registerEmail" name="registerEmail">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="••••••••" required [(ngModel)]="registerPassword" name="registerPassword">
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" placeholder="••••••••" required [(ngModel)]="registerConfirmPassword" name="registerConfirmPassword">
        </div>
        <button type="submit" class="btn-primary">Registrarse</button>
        <p class="toggle-form">
          ¿Ya tienes cuenta? 
          <a (click)="toggleForm()">Inicia sesión</a>
        </p>
      </form>
    }
  </div>
</div>
